name: Deploy CYOA Web App to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload app folder as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the app/ subdirectory as the web root
          path: './app'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
